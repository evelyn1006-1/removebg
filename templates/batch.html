<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batch Results • RemoveBG</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Batch complete</h1>
      <p>Download each PNG below.</p>
    </header>

    <div class="batch-grid">
      {% for file_id in file_ids %}
        <div class="result">
          <img src="{{ url_for('result_file', file_id=file_id) }}" alt="Background removed result">
          <div class="actions">
            <a class="button" href="{{ url_for('download_file', file_id=file_id) }}">Download PNG</a>
          </div>
        </div>
      {% endfor %}
    </div>

    <div class="actions">
      <a class="button ghost" href="{{ url_for('index') }}">Process another batch</a>
    </div>
  </main>
</body>
</html>
